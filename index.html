<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chatty</title>
<link rel="icon" href="data:,">
<style>
  :root{
    --teal-dark:#0b4f4a;
    --teal:#128c7e;
    --teal-light:#25d366;
    --bg-chat:#e9ded3;
    --bubble-me:#d9fdd3;
    --bubble-them:#ffffff;
    --text-dark:#1f2c2b;
    --text-muted:#6b7b79;
    --danger:#d64545;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0b1d1b;
    color:var(--text-dark);
  }
  #app{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    background:#fff;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,.4);
  }
  .screen{
    display:none;
    flex-direction:column;
    height:100%;
    width:100%;
  }
  .screen.active{display:flex;}

  /* ---------- Login ---------- */
  #login-screen{
    justify-content:center;
    align-items:center;
    background:linear-gradient(160deg,var(--teal-dark),var(--teal));
    padding:32px;
    gap:14px;
    text-align:center;
    color:#fff;
    overflow-y:auto;
  }
  #login-screen h1{
    font-size:2rem;
    margin:0;
    letter-spacing:-0.5px;
  }
  #login-screen p{
    margin:0 0 8px;
    opacity:.85;
    font-size:.95rem;
    max-width:280px;
  }
  #login-form, #admin-login-box{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
    max-width:280px;
  }
  #login-form input, #admin-login-box input{
    padding:14px 16px;
    border-radius:10px;
    border:none;
    font-size:1rem;
    outline:none;
  }
  #login-form button, #admin-login-box button{
    padding:14px;
    border-radius:10px;
    border:none;
    background:var(--teal-light);
    color:#08331b;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
  }
  #login-form button:disabled, #admin-login-box button:disabled{opacity:.6;cursor:default;}
  #login-error, #admin-login-error{color:#ffd6d6;font-size:.85rem;min-height:18px;}
  .link-btn{
    background:transparent;border:none;color:#fff;
    opacity:.75;font-size:.82rem;text-decoration:underline;
    cursor:pointer;margin-top:4px;
  }
  #admin-login-box{
    margin-top:6px;padding-top:14px;border-top:1px solid rgba(255,255,255,.25);
  }
  .hidden{display:none !important;}

  /* ---------- Header commun ---------- */
  .topbar{
    background:var(--teal-dark);
    color:#fff;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
  }
  .topbar h2{margin:0;font-size:1.1rem;font-weight:600;flex:1;}
  .topbar .sub{font-size:.75rem;opacity:.75;}
  .icon-btn{
    background:transparent;border:none;color:#fff;
    font-size:1.2rem;cursor:pointer;padding:4px 8px;
  }
  .avatar{
    width:38px;height:38px;border-radius:50%;
    background:var(--teal-light);
    color:#08331b;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.95rem;flex-shrink:0;
  }
  .avatar.admin{background:#ffb300;}

  /* ---------- Tabs ---------- */
  .tab-bar{
    display:flex;
    background:#fff;
    border-bottom:1px solid #eee;
    flex-shrink:0;
  }
  .tab-btn{
    flex:1;
    padding:12px 8px;
    text-align:center;
    background:none;
    border:none;
    font-size:.92rem;
    font-weight:600;
    color:var(--text-muted);
    cursor:pointer;
    border-bottom:3px solid transparent;
  }
  .tab-btn.active{
    color:var(--teal-dark);
    border-bottom-color:var(--teal);
  }
  .tab-content{
    flex:1;overflow-y:auto;background:#fff;display:none;
  }
  .tab-content.active{display:block;}

  /* ---------- Listes (contacts / discussions / users) ---------- */
  .list-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;
    border-bottom:1px solid #f0f0f0;
    cursor:pointer;
  }
  .list-row:hover{background:#f7faf9;}
  .row-main{flex:1;min-width:0;}
  .row-name{font-weight:600;font-size:.98rem;}
  .row-hint{font-size:.8rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row-time{font-size:.72rem;color:var(--text-muted);flex-shrink:0;}
  .row-empty{padding:40px 24px;text-align:center;color:var(--text-muted);}
  .row-action-btn{
    border:none;background:#fdeaea;color:var(--danger);
    padding:6px 10px;border-radius:8px;font-size:.78rem;cursor:pointer;flex-shrink:0;
  }

  /* ---------- Chat ---------- */
  #messages, #admin-thread-messages{
    flex:1;overflow-y:auto;
    background:var(--bg-chat);
    padding:14px 10px;
    display:flex;flex-direction:column;
    gap:4px;
  }
  .bubble-row{display:flex;width:100%;}
  .bubble-row.me{justify-content:flex-end;}
  .bubble-row.them{justify-content:flex-start;}
  .bubble{
    max-width:75%;
    padding:8px 10px 6px;
    border-radius:10px;
    font-size:.92rem;
    line-height:1.35;
    position:relative;
    box-shadow:0 1px 1px rgba(0,0,0,.08);
    word-wrap:break-word;
  }
  .bubble.me{background:var(--bubble-me);border-top-right-radius:2px;}
  .bubble.them{background:var(--bubble-them);border-top-left-radius:2px;}
  .bubble .meta{
    display:flex;justify-content:flex-end;align-items:center;gap:5px;
    margin-top:2px;
  }
  .bubble .time{font-size:.65rem;color:var(--text-muted);}
  .bubble .admin-sender{font-size:.65rem;color:var(--text-muted);font-weight:700;display:block;margin-bottom:2px;}
  .ticks{font-size:.8rem;line-height:1;}
  .ticks.unread{color:var(--text-muted);}
  .ticks.read{color:#53bdeb;}
  .bubble .del-msg-btn{
    border:none;background:none;color:var(--danger);
    font-size:.68rem;cursor:pointer;padding:0;margin-left:4px;
  }
  .typing-dots{display:inline-flex;gap:2px;align-items:center;}
  .typing-dots span{
    width:5px;height:5px;border-radius:50%;
    background:#fff;opacity:.6;
    animation:typing-blink 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){animation-delay:.2s;}
  .typing-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes typing-blink{
    0%,80%,100%{opacity:.3;transform:translateY(0);}
    40%{opacity:1;transform:translateY(-2px);}
  }
  #composer{
    display:flex;gap:8px;
    padding:10px;
    background:#f0f0f0;
    flex-shrink:0;
  }
  #composer input{
    flex:1;
    padding:12px 16px;
    border-radius:22px;
    border:none;
    font-size:.95rem;
    outline:none;
  }
  #composer button{
    width:44px;height:44px;
    border-radius:50%;
    border:none;
    background:var(--teal);
    color:#fff;
    font-size:1.1rem;
    cursor:pointer;
    flex-shrink:0;
  }

  /* ---------- Admin ---------- */
  #admin-screen .topbar{background:#7a5200;}
  #add-user-box{
    display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid #eee;
  }
  #add-user-box input{
    flex:1;padding:10px 12px;border-radius:8px;border:1px solid #ddd;font-size:.9rem;outline:none;
  }
  #add-user-box button{
    padding:10px 14px;border-radius:8px;border:none;background:var(--teal);color:#fff;font-weight:600;cursor:pointer;
  }

  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app">

  <!-- ============ ECRAN LOGIN ============ -->
  <section id="login-screen" class="screen active">
    <h1>Chatty</h1>
    <p>Entre un pseudo pour commencer à discuter. Pas besoin de mot de passe pour l'instant.</p>
    <form id="login-form">
      <input id="username-input" type="text" placeholder="Ton pseudo" maxlength="24" autocomplete="off" required>
      <button type="submit" id="login-submit">Entrer</button>
      <div id="login-error"></div>
    </form>

    <button type="button" class="link-btn" id="admin-toggle-link">Connexion administrateur</button>
    <div id="admin-login-box" class="hidden">
      <input id="admin-passcode-input" type="password" placeholder="Code administrateur" autocomplete="off">
      <button type="button" id="admin-login-submit">Accéder à l'administration</button>
      <div id="admin-login-error"></div>
    </div>
  </section>

  <!-- ============ ECRAN CONTACTS (Discussions / Amis) ============ -->
  <section id="contacts-screen" class="screen">
    <div class="topbar">
      <div class="avatar" id="my-avatar">?</div>
      <div>
        <h2 id="my-username-label">Moi</h2>
        <div class="sub">Chatty</div>
      </div>
      <button class="icon-btn" id="refresh-contacts" title="Rafraîchir">⟳</button>
      <button class="icon-btn" id="logout-btn" title="Se déconnecter">⎋</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="discussions-tab">Discussions</button>
      <button class="tab-btn" data-tab="friends-tab">Amis</button>
    </div>
    <div id="discussions-tab" class="tab-content active">
      <div id="discussions-list"></div>
    </div>
    <div id="friends-tab" class="tab-content">
      <div id="friends-list"></div>
    </div>
  </section>

  <!-- ============ ECRAN CHAT ============ -->
  <section id="chat-screen" class="screen">
    <div class="topbar">
      <button class="icon-btn" id="back-btn">←</button>
      <div class="avatar" id="peer-avatar">?</div>
      <div>
        <h2 id="peer-username-label">—</h2>
        <div class="sub" id="chat-sub">temps réel</div>
        <div class="sub hidden" id="typing-indicator">
          <span class="typing-dots"><span></span><span></span><span></span></span>
          &nbsp;en train d'écrire...
        </div>
      </div>
    </div>
    <div id="messages"><div class="row-empty" id="chat-empty">Aucun message pour l'instant. Dis bonjour 👋</div></div>
    <form id="composer">
      <input id="message-input" type="text" placeholder="Écris un message" autocomplete="off" required>
      <button type="submit">➤</button>
    </form>
  </section>

  <!-- ============ ECRAN ADMIN ============ -->
  <section id="admin-screen" class="screen">
    <div class="topbar">
      <div class="avatar admin">A</div>
      <div>
        <h2>Administration</h2>
        <div class="sub">Accès complet</div>
      </div>
      <button class="icon-btn" id="admin-logout-btn" title="Quitter l'administration">⎋</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-admin-tab="admin-users-tab">Utilisateurs</button>
      <button class="tab-btn" data-admin-tab="admin-discussions-tab">Toutes les discussions</button>
    </div>
    <div id="admin-users-tab" class="tab-content active">
      <div id="add-user-box">
        <input id="new-user-input" type="text" placeholder="Nouveau pseudo" maxlength="24">
        <button type="button" id="add-user-btn">Ajouter</button>
      </div>
      <div id="admin-users-list"></div>
    </div>
    <div id="admin-discussions-tab" class="tab-content">
      <div id="admin-discussions-list"></div>
    </div>
  </section>

  <!-- ============ ECRAN ADMIN : DETAIL D'UNE DISCUSSION ============ -->
  <section id="admin-thread-screen" class="screen">
    <div class="topbar">
      <button class="icon-btn" id="admin-thread-back-btn">←</button>
      <div>
        <h2 id="admin-thread-title">—</h2>
        <div class="sub">Vue administrateur</div>
      </div>
    </div>
    <div id="admin-thread-messages"></div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================================================================
   CONFIGURATION SUPABASE
   Remplace ces deux valeurs par celles de ton projet Supabase :
   Project Settings > API Keys > Publishable key
   =================================================================== */
const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-PUBLISHABLE-KEY";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------------- Etat local ---------------- */
let me = localStorage.getItem("chatty_username") || null;
let activePeer = null;
let messagesChannel = null;
let adminThreadPair = null; // {a, b}

/* ---------------- Elements / navigation ---------------- */
const screens = {
  login: document.getElementById("login-screen"),
  contacts: document.getElementById("contacts-screen"),
  chat: document.getElementById("chat-screen"),
  admin: document.getElementById("admin-screen"),
  adminThread: document.getElementById("admin-thread-screen"),
};
function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove("active"));
  screens[name].classList.add("active");
}

function initials(name){
  return (name || "?").trim().slice(0,2).toUpperCase();
}
function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

/* Bascule d'onglets générique */
function setupTabs(barSelectorAttr, contentMap){
  document.querySelectorAll(`[${barSelectorAttr}]`).forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(`[${barSelectorAttr}]`).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const targetId = btn.getAttribute(barSelectorAttr);
      Object.values(contentMap).forEach(id => document.getElementById(id).classList.remove("active"));
      document.getElementById(targetId).classList.add("active");
    });
  });
}
setupTabs("data-tab", { d: "discussions-tab", f: "friends-tab" });
setupTabs("data-admin-tab", { u: "admin-users-tab", c: "admin-discussions-tab" });

/* ---------------- Login (utilisateur normal) ---------------- */
const loginForm = document.getElementById("login-form");
const usernameInput = document.getElementById("username-input");
const loginError = document.getElementById("login-error");
const loginSubmit = document.getElementById("login-submit");

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const desired = usernameInput.value.trim();
  if(!desired) return;
  loginError.textContent = "";
  loginSubmit.disabled = true;
  loginSubmit.textContent = "...";
  try{
    const { data: existing, error: fetchErr } = await supabaseClient
      .from("users")
      .select("username")
      .eq("username", desired)
      .maybeSingle();
    if(fetchErr) throw fetchErr;

    if(!existing){
      const { error: insertErr } = await supabaseClient
        .from("users")
        .insert({ username: desired });
      if(insertErr) throw insertErr;
    }
    me = desired;
    localStorage.setItem("chatty_username", me);
    enterContacts();
  }catch(err){
    console.error(err);
    loginError.textContent = "Erreur : " + (err.message || "impossible de se connecter");
  }finally{
    loginSubmit.disabled = false;
    loginSubmit.textContent = "Entrer";
  }
});

/* ---------------- Login (admin) ----------------
   Complètement indépendant des comptes normaux : protégé par un code
   vérifié côté serveur (fonction Postgres), jamais stocké en clair
   côté client. Voir supabase-setup.sql. */
const adminToggleLink = document.getElementById("admin-toggle-link");
const adminLoginBox = document.getElementById("admin-login-box");
const adminPasscodeInput = document.getElementById("admin-passcode-input");
const adminLoginSubmit = document.getElementById("admin-login-submit");
const adminLoginError = document.getElementById("admin-login-error");

adminToggleLink.addEventListener("click", () => {
  adminLoginBox.classList.toggle("hidden");
});

adminLoginSubmit.addEventListener("click", async () => {
  const code = adminPasscodeInput.value;
  if(!code) return;
  adminLoginError.textContent = "";
  adminLoginSubmit.disabled = true;
  try{
    const { data, error } = await supabaseClient.rpc("check_admin_passcode", { input_passcode: code });
    if(error) throw error;
    if(data === true){
      sessionStorage.setItem("chatty_is_admin", "true");
      enterAdmin();
    }else{
      adminLoginError.textContent = "Code incorrect.";
    }
  }catch(err){
    console.error(err);
    adminLoginError.textContent = "Erreur : " + (err.message || "vérification impossible");
  }finally{
    adminLoginSubmit.disabled = false;
  }
});

document.getElementById("admin-logout-btn").addEventListener("click", () => {
  sessionStorage.removeItem("chatty_is_admin");
  showScreen("login");
});

/* ---------------- Contacts : Discussions + Amis ---------------- */
const discussionsList = document.getElementById("discussions-list");
const friendsList = document.getElementById("friends-list");
const myAvatar = document.getElementById("my-avatar");
const myUsernameLabel = document.getElementById("my-username-label");

async function enterContacts(){
  myAvatar.textContent = initials(me);
  myUsernameLabel.textContent = me;
  showScreen("contacts");
  await Promise.all([loadDiscussions(), loadFriends()]);
}

async function loadFriends(){
  friendsList.innerHTML = "<div class='row-empty'>Chargement...</div>";
  const { data, error } = await supabaseClient
    .from("users")
    .select("username")
    .neq("username", me)
    .order("username", { ascending: true });

  if(error){
    friendsList.innerHTML = "<div class='row-empty'>Erreur de chargement.</div>";
    console.error(error);
    return;
  }
  if(!data || data.length === 0){
    friendsList.innerHTML = "<div class='row-empty'>Personne d'autre pour l'instant. Partage l'app à un ami !</div>";
    return;
  }
  friendsList.innerHTML = "";
  data.forEach(u => {
    const row = document.createElement("div");
    row.className = "list-row";
    row.innerHTML = `
      <div class="avatar">${initials(u.username)}</div>
      <div class="row-main">
        <div class="row-name">${escapeHtml(u.username)}</div>
        <div class="row-hint">Toucher pour discuter</div>
      </div>`;
    row.addEventListener("click", () => enterChat(u.username));
    friendsList.appendChild(row);
  });
}

async function loadDiscussions(){
  discussionsList.innerHTML = "<div class='row-empty'>Chargement...</div>";
  const { data, error } = await supabaseClient
    .from("messages")
    .select("*")
    .or(`sender_username.eq.${me},receiver_username.eq.${me}`)
    .order("created_at", { ascending: false });

  if(error){
    discussionsList.innerHTML = "<div class='row-empty'>Erreur de chargement.</div>";
    console.error(error);
    return;
  }
  const byPeer = new Map();
  (data || []).forEach(m => {
    const peer = m.sender_username === me ? m.receiver_username : m.sender_username;
    if(!byPeer.has(peer)) byPeer.set(peer, m); // le premier rencontré est le plus récent (tri desc)
  });

  if(byPeer.size === 0){
    discussionsList.innerHTML = "<div class='row-empty'>Aucune discussion pour l'instant. Va dans l'onglet Amis pour en démarrer une.</div>";
    return;
  }
  discussionsList.innerHTML = "";
  byPeer.forEach((lastMsg, peer) => {
    const row = document.createElement("div");
    row.className = "list-row";
    const time = new Date(lastMsg.created_at).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    const prefix = lastMsg.sender_username === me ? "Toi : " : "";
    row.innerHTML = `
      <div class="avatar">${initials(peer)}</div>
      <div class="row-main">
        <div class="row-name">${escapeHtml(peer)}</div>
        <div class="row-hint">${escapeHtml(prefix + lastMsg.content)}</div>
      </div>
      <div class="row-time">${time}</div>`;
    row.addEventListener("click", () => enterChat(peer));
    discussionsList.appendChild(row);
  });
}

document.getElementById("refresh-contacts").addEventListener("click", () => {
  loadDiscussions();
  loadFriends();
});
document.getElementById("logout-btn").addEventListener("click", () => {
  localStorage.removeItem("chatty_username");
  me = null;
  showScreen("login");
});

/* ---------------- Chat 1-à-1 ---------------- */
const messagesEl = document.getElementById("messages");
const peerAvatar = document.getElementById("peer-avatar");
const peerUsernameLabel = document.getElementById("peer-username-label");
const composer = document.getElementById("composer");
const messageInput = document.getElementById("message-input");

async function enterChat(peer){
  activePeer = peer;
  peerAvatar.textContent = initials(peer);
  peerUsernameLabel.textContent = peer;
  document.getElementById("typing-indicator").classList.add("hidden");
  document.getElementById("chat-sub").classList.remove("hidden");
  showScreen("chat");
  await loadMessages();
  subscribeToMessages();
}

document.getElementById("back-btn").addEventListener("click", () => {
  unsubscribeFromMessages();
  activePeer = null;
  showScreen("contacts");
  loadDiscussions();
});

function ticksHtml(msg){
  if(msg.sender_username !== me) return "";
  const read = !!msg.read_at;
  return `<span class="ticks ${read ? "read" : "unread"}">✓✓</span>`;
}

function bubbleHtml(msg){
  const mine = msg.sender_username === me;
  const time = new Date(msg.created_at).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  return `
    <div class="bubble-row ${mine ? "me" : "them"}" data-id="${msg.id}">
      <div class="bubble ${mine ? "me" : "them"}">
        ${escapeHtml(msg.content)}
        <div class="meta">
          <span class="time">${time}</span>
          ${ticksHtml(msg)}
        </div>
      </div>
    </div>`;
}

function updateTicksInDom(msg){
  const row = messagesEl.querySelector(`.bubble-row[data-id="${msg.id}"]`);
  if(!row) return;
  const existingTicks = row.querySelector(".ticks");
  if(existingTicks) existingTicks.outerHTML = ticksHtml(msg);
}

async function loadMessages(){
  messagesEl.innerHTML = "<div class='row-empty' id='chat-empty'>Chargement...</div>";
  const { data, error } = await supabaseClient
    .from("messages")
    .select("*")
    .or(
      `and(sender_username.eq.${me},receiver_username.eq.${activePeer}),and(sender_username.eq.${activePeer},receiver_username.eq.${me})`
    )
    .order("created_at", { ascending: true });

  if(error){
    messagesEl.innerHTML = "<div class='row-empty' id='chat-empty'>Erreur de chargement.</div>";
    console.error(error);
    return;
  }
  if(!data || data.length === 0){
    messagesEl.innerHTML = "<div class='row-empty' id='chat-empty'>Aucun message pour l'instant. Dis bonjour 👋</div>";
    return;
  }
  messagesEl.innerHTML = data.map(bubbleHtml).join("");
  scrollToBottom();
  markMessagesAsRead();
}

async function markMessagesAsRead(){
  const { error } = await supabaseClient
    .from("messages")
    .update({ read_at: new Date().toISOString() })
    .eq("sender_username", activePeer)
    .eq("receiver_username", me)
    .is("read_at", null)
    .select();
  if(error) console.error(error);
}

function scrollToBottom(){
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function conversationChannelName(){
  return "conv-" + [me, activePeer].sort().join("-");
}

function subscribeToMessages(){
  unsubscribeFromMessages();
  messagesChannel = supabaseClient
    .channel(conversationChannelName())
    .on("postgres_changes",
      { event: "INSERT", schema: "public", table: "messages" },
      (payload) => {
        const msg = payload.new;
        const isForThisConversation =
          (msg.sender_username === me && msg.receiver_username === activePeer) ||
          (msg.sender_username === activePeer && msg.receiver_username === me);
        if(!isForThisConversation) return;
        if(messagesEl.querySelector("#chat-empty")) messagesEl.innerHTML = "";
        messagesEl.insertAdjacentHTML("beforeend", bubbleHtml(msg));
        scrollToBottom();
        if(msg.sender_username === activePeer) markMessagesAsRead();
      }
    )
    .on("postgres_changes",
      { event: "UPDATE", schema: "public", table: "messages" },
      (payload) => {
        const msg = payload.new;
        const isForThisConversation =
          (msg.sender_username === me && msg.receiver_username === activePeer) ||
          (msg.sender_username === activePeer && msg.receiver_username === me);
        if(!isForThisConversation) return;
        updateTicksInDom(msg);
      }
    )
    .on("broadcast",
      { event: "typing" },
      (payload) => {
        if(payload.payload && payload.payload.from === activePeer) showTypingIndicator();
      }
    )
    .subscribe();
}

function unsubscribeFromMessages(){
  if(messagesChannel){
    supabaseClient.removeChannel(messagesChannel);
    messagesChannel = null;
  }
  clearTimeout(typingHideTimer);
}

/* ---------------- Indicateur "en train d'écrire" ---------------- */
const typingIndicatorEl = document.getElementById("typing-indicator");
const chatSubEl = document.getElementById("chat-sub");
let typingHideTimer = null;
let typingSendThrottle = null;

function showTypingIndicator(){
  chatSubEl.classList.add("hidden");
  typingIndicatorEl.classList.remove("hidden");
  clearTimeout(typingHideTimer);
  typingHideTimer = setTimeout(() => {
    typingIndicatorEl.classList.add("hidden");
    chatSubEl.classList.remove("hidden");
  }, 3000);
}

function broadcastTyping(){
  if(!messagesChannel || !activePeer) return;
  messagesChannel.send({ type: "broadcast", event: "typing", payload: { from: me } });
}

messageInput.addEventListener("input", () => {
  if(typingSendThrottle) return;
  broadcastTyping();
  typingSendThrottle = setTimeout(() => { typingSendThrottle = null; }, 2000);
});

composer.addEventListener("submit", async (e) => {
  e.preventDefault();
  const content = messageInput.value.trim();
  if(!content || !activePeer) return;
  messageInput.value = "";
  const { error } = await supabaseClient
    .from("messages")
    .insert({ sender_username: me, receiver_username: activePeer, content: content });
  if(error){
    console.error(error);
    alert("Message non envoyé : " + error.message);
  }
});

/* ==================================================================
   ADMINISTRATION
   ================================================================== */
async function enterAdmin(){
  showScreen("admin");
  await Promise.all([loadAdminUsers(), loadAdminDiscussions()]);
}

/* ---- Onglet Utilisateurs ---- */
const adminUsersList = document.getElementById("admin-users-list");
const newUserInput = document.getElementById("new-user-input");

async function loadAdminUsers(){
  adminUsersList.innerHTML = "<div class='row-empty'>Chargement...</div>";
  const { data, error } = await supabaseClient
    .from("users")
    .select("username, created_at")
    .order("username", { ascending: true });
  if(error){
    adminUsersList.innerHTML = "<div class='row-empty'>Erreur de chargement.</div>";
    console.error(error);
    return;
  }
  if(!data || data.length === 0){
    adminUsersList.innerHTML = "<div class='row-empty'>Aucun utilisateur pour l'instant.</div>";
    return;
  }
  adminUsersList.innerHTML = "";
  data.forEach(u => {
    const row = document.createElement("div");
    row.className = "list-row";
    row.innerHTML = `
      <div class="avatar">${initials(u.username)}</div>
      <div class="row-main">
        <div class="row-name">${escapeHtml(u.username)}</div>
        <div class="row-hint">Inscrit le ${new Date(u.created_at).toLocaleDateString()}</div>
      </div>
      <button class="row-action-btn" data-username="${escapeHtml(u.username)}">Supprimer</button>`;
    row.querySelector(".row-action-btn").addEventListener("click", async (ev) => {
      ev.stopPropagation();
      if(!confirm(`Supprimer ${u.username} et tous ses messages ?`)) return;
      const { error: delErr } = await supabaseClient.from("users").delete().eq("username", u.username);
      if(delErr){
        alert("Erreur : " + delErr.message);
        return;
      }
      loadAdminUsers();
      loadAdminDiscussions();
    });
    adminUsersList.appendChild(row);
  });
}

document.getElementById("add-user-btn").addEventListener("click", async () => {
  const username = newUserInput.value.trim();
  if(!username) return;
  const { error } = await supabaseClient.from("users").insert({ username });
  if(error){
    alert("Erreur : " + error.message);
    return;
  }
  newUserInput.value = "";
  loadAdminUsers();
});

/* ---- Onglet Toutes les discussions ---- */
const adminDiscussionsList = document.getElementById("admin-discussions-list");

async function loadAdminDiscussions(){
  adminDiscussionsList.innerHTML = "<div class='row-empty'>Chargement...</div>";
  const { data, error } = await supabaseClient
    .from("messages")
    .select("*")
    .order("created_at", { ascending: false });
  if(error){
    adminDiscussionsList.innerHTML = "<div class='row-empty'>Erreur de chargement.</div>";
    console.error(error);
    return;
  }
  const byPair = new Map();
  (data || []).forEach(m => {
    const key = [m.sender_username, m.receiver_username].sort().join(" ↔ ");
    if(!byPair.has(key)) byPair.set(key, { lastMsg: m, pair: [m.sender_username, m.receiver_username].sort() });
  });
  if(byPair.size === 0){
    adminDiscussionsList.innerHTML = "<div class='row-empty'>Aucune discussion pour l'instant.</div>";
    return;
  }
  adminDiscussionsList.innerHTML = "";
  byPair.forEach((entry, key) => {
    const row = document.createElement("div");
    row.className = "list-row";
    const time = new Date(entry.lastMsg.created_at).toLocaleString([], {dateStyle:"short", timeStyle:"short"});
    row.innerHTML = `
      <div class="row-main">
        <div class="row-name">${escapeHtml(key)}</div>
        <div class="row-hint">${escapeHtml(entry.lastMsg.content)}</div>
      </div>
      <div class="row-time">${time}</div>`;
    row.addEventListener("click", () => enterAdminThread(entry.pair[0], entry.pair[1]));
    adminDiscussionsList.appendChild(row);
  });
}

/* ---- Détail d'une discussion (vue admin, lecture + suppression) ---- */
const adminThreadMessages = document.getElementById("admin-thread-messages");
const adminThreadTitle = document.getElementById("admin-thread-title");

async function enterAdminThread(userA, userB){
  adminThreadPair = { a: userA, b: userB };
  adminThreadTitle.textContent = `${userA} ↔ ${userB}`;
  showScreen("adminThread");
  await loadAdminThreadMessages();
}

document.getElementById("admin-thread-back-btn").addEventListener("click", () => {
  showScreen("admin");
});

function adminBubbleHtml(msg){
  const mine = msg.sender_username === adminThreadPair.a;
  const time = new Date(msg.created_at).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  return `
    <div class="bubble-row ${mine ? "me" : "them"}" data-id="${msg.id}">
      <div class="bubble ${mine ? "me" : "them"}">
        <span class="admin-sender">${escapeHtml(msg.sender_username)}</span>
        ${escapeHtml(msg.content)}
        <div class="meta">
          <span class="time">${time}</span>
          <button class="del-msg-btn" data-id="${msg.id}">supprimer</button>
        </div>
      </div>
    </div>`;
}

async function loadAdminThreadMessages(){
  adminThreadMessages.innerHTML = "<div class='row-empty'>Chargement...</div>";
  const { a, b } = adminThreadPair;
  const { data, error } = await supabaseClient
    .from("messages")
    .select("*")
    .or(`and(sender_username.eq.${a},receiver_username.eq.${b}),and(sender_username.eq.${b},receiver_username.eq.${a})`)
    .order("created_at", { ascending: true });
  if(error){
    adminThreadMessages.innerHTML = "<div class='row-empty'>Erreur de chargement.</div>";
    console.error(error);
    return;
  }
  adminThreadMessages.innerHTML = data.map(adminBubbleHtml).join("");
  adminThreadMessages.querySelectorAll(".del-msg-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      if(!confirm("Supprimer ce message ?")) return;
      const { error: delErr } = await supabaseClient.from("messages").delete().eq("id", btn.dataset.id);
      if(delErr){
        alert("Erreur : " + delErr.message);
        return;
      }
      loadAdminThreadMessages();
    });
  });
  adminThreadMessages.scrollTop = adminThreadMessages.scrollHeight;
}

/* ---------------- Démarrage ---------------- */
if(sessionStorage.getItem("chatty_is_admin") === "true"){
  enterAdmin();
}else if(me){
  enterContacts();
}
</script>
